openapi: 3.1.0
info:
  title: B5 - Analytics Service API
  version: 1.0.0
  description: API cung cấp dịch vụ tổng hợp và phân tích dữ liệu cho hệ thống Smart Campus.
  contact:
    name: Tran Duc Thanh
    email: 1771020630@dnu.edu.vn

servers:
  - url: http://localhost:4010
    description: Mock Server chạy bằng Prism

tags:
  - name: System
    description: Các API kiểm tra trạng thái vận hành hệ thống
  - name: Analytics
    description: Các API tính toán, truy vấn số liệu tổng hợp Dashboard
  - name: Reports
    description: Các API quản lý và kết xuất báo cáo phân tích sâu
  - name: Anomalies
    description: Các API truy vấn lịch sử sự cố bất thường

paths:
  /health:
    get:
      summary: Kiểm tra trạng thái hệ thống
      description: Trả về trạng thái hoạt động hiện tại của hệ thống Analytics Service để API Gateway hoặc hệ thống Monitor theo dõi.
      operationId: checkHealth
      tags:
        - System
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '500':
          description: Lỗi hệ thống nội bộ từ phía nhà cung cấp dịch vụ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/v1/analytics/summary:
    get:
      summary: Lấy dữ liệu tổng hợp nhanh cho màn hình chính (Dashboard)
      description: Truy vấn các chỉ số đo lường hiệu suất (KPIs) tổng quát trên toàn bộ Smart Campus để phục vụ hiển thị thời gian thực trên Web Dashboard của nhóm B6.
      operationId: getDashboardSummary
      tags:
        - Analytics
      responses:
        '200':
          description: Trả về số liệu thống kê tổng hợp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          description: Lỗi xác thực quyền truy cập do thiếu hoặc sai Token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/v1/analytics/reports:
    post:
      summary: Yêu cầu trích xuất báo cáo phân tích sâu
      description: Khởi tạo một tiến trình xử lý bất đồng bộ để kết xuất báo cáo dữ liệu lịch sử dựa theo cấu hình bộ lọc được yêu cầu của hệ thống tiêu thụ.
      operationId: createAnalyticsReport
      tags:
        - Reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '201':
          description: Tạo yêu cầu báo cáo thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Tham số đầu vào không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/v1/analytics/anomalies:
    get:
      summary: Lấy danh sách các sự kiện bất thường hệ thống phát hiện được
      description: Trả về danh sách lịch sử các sự cố hoặc hành vi bất thường thu thập được từ các thiết bị ngoại vi và luồng phân tích AI Vision, có hỗ trợ phân trang.
      operationId: getAnomalyEvents
      tags:
        - Anomalies
      parameters:
        - name: page
          in: query
          required: true
          description: Số trang hiện tại cần lấy dữ liệu
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: true
          description: Số lượng bản ghi tối đa trên một trang dữ liệu
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Danh sách các sự kiện bất thường hoạt động mượt mà
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyResponseArray'
        '400':
          description: Tham số phân trang truyền vào không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

components:
  schemas:
    HealthStatus:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: "healthy"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-24T21:00:00Z"

    DashboardSummary:
      type: object
      required:
        - total_records
        - system_efficiency
      properties:
        total_records:
          type: integer
          example: 12540
        system_efficiency:
          type: number
          example: 94.5
        last_updated_by:
          type: [string, "null"]
          description: Tên người cập nhật cuối cùng, nhận null nếu hệ thống tự động xử lý
          example: "b5_processor"

    ReportRequest:
      type: object
      required:
        - start_date
        - end_date
        - report_type
      properties:
        start_date:
          type: string
          format: date-time
          example: "2026-05-24T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2026-05-24T23:59:59Z"
        report_type:
          type: string
          enum: [iot, camera, access]
          example: "iot"

    ReportResponse:
      type: object
      required:
        - report_id
        - status
      properties:
        report_id:
          type: string
          format: uuid
          example: "7b9e02a1-c35d-4e2b-a8f1-8c4d5e6f7a8b"
        status:
          type: string
          example: "pending"

    AnomalyResponseArray:
      type: array
      items:
        $ref: '#/components/schemas/AnomalyEvent'

    AnomalyEvent:
      type: object
      required:
        - event_id
        - type
        - detected_at
      properties:
        event_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"
        type:
          type: string
          enum: [IoTAnomaly, VisionAnomaly]
          example: "IoTAnomaly"
        detected_at:
          type: string
          format: date-time
          example: "2026-05-24T20:15:00Z"
      discriminator:
        propertyName: type
        mapping:
          IoTAnomaly: '#/components/schemas/IoTAnomaly'
          VisionAnomaly: '#/components/schemas/VisionAnomaly'
      oneOf:
        - $ref: '#/components/schemas/IoTAnomaly'
        - $ref: '#/components/schemas/VisionAnomaly'

    IoTAnomaly:
      allOf:
        - $ref: '#/components/schemas/AnomalyEvent'
        - type: object
          properties:
            sensor_id:
              type: string
              example: "SENSOR-102"
            threshold_exceeded:
              type: number
              example: 45.2

    VisionAnomaly:
      allOf:
        - $ref: '#/components/schemas/AnomalyEvent'
        - type: object
          properties:
            camera_id:
              type: string
              example: "CAM-ZONE-A"
            unauthorized_zone_id:
              type: string
              example: "ZONE-RESTRICTED"

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          example: "https://api.smartcampus.edu.vn/errors/bad-request"
        title:
          type: string
          example: "Invalid Input Parameters"
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: string
          example: "The field 'start_date' cannot be greater than 'end_date'."
        instance:
          type: string
          format: uri
          example: "https://api.smartcampus.edu.vn/api/v1/analytics/reports"